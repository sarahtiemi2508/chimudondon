<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/styleHomeTaiko.css">
    <script src="./js/sessao.js"></script>

    <link rel="icon" href="assets/imgs/taiko minimalista co.png">
    <link rel="stylesheet" href="header.html">



</head>

<body style="background-color: white;">

    <div class="header">
        <img class="logo" src="assets/imgs/taiko minimalista co.png" alt="logo">
        <div class="navBar">
            <a href="index.html">
                <button class="itensNavBar">HOME</button>
            </a>
            <div class="itensNavBar">|</div>
            <a href="sobreTaiko.html">
                <button class="itensNavBar">SOBRE</button>
            </a>
        </div>
        <div class="loginCadastroHeader">
            <a href="cadastroUsuarioTaiko.html">
                <button class="botaoCadastroHeader" class="itensNavBar">Cadastro</button>
            </a>
            <a href="loginTaiko.html">
                <button class="botaoLoginHeader" class="itensNavBar">Login</button>
            </a>
        </div>
    </div>

    <div class="paginaLogin">
        <div class="borderLogin">
            <div class="boxLogin">
                <h2 id="tituloLogin">Login</h2>
                <div class="contBoxLogin">
                    <input type="text" class="iptLogin" id="iptLoginEmail" placeholder="Insira seu Email"><br>
                    <div class="funcaoOlho">
                        <input type="password" class="iptLogin" id="iptLoginSenha" placeholder="Insira sua senha"><br>

                    </div>
                    <button id='botaoLogin' onclick="logar()">Fazer Login</button>
                </div>
                <div id="div_aguardar" style="width: 50px; display: none;">
                    <img src="assets/imgs/imgLoading.svg" id="loading-gif" style="width: 100%;" />
                </div>
                <div id="semCadastro">
                    <div class="pergunta">Não tem cadastro ainda?</div>
                    <a href="cadastroUsuarioTaiko.html">
                        <button id="encaminharLogin" style="color: #EB0701;">Clique aqui!</button>
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>

<script>


    function logar() {
        aguardar();

        var emailVar = iptLoginEmail.value;
        var senhaVar = iptLoginSenha.value;

        if (emailVar == "" || senhaVar == "") {
            cardErro.style.display = "block"
            mensagem_erro.innerHTML = "(Mensagem de erro para todos os campos em branco)";
            finalizarAguardar();
            return false;
        }
        else {
            setInterval(sumirMensagem, 5000)
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id;
                    sessionStorage.AQUARIOS = JSON.stringify(json.aquarios)

                    setTimeout(function () {
                        window.location.href = "posCadastroTaiko.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

    function sumirMensagem() {
        cardErro.style.display = "none"
    }

</script>

</html>
