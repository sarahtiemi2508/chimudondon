<script src="../js/menu.js"></script>

<script>

  const labelsG1=[
    'Paranku',
    'Odaiko',
    'Shime',
    
  ];
  const dataG1={
    labels:labelsG1,
    datasets:[{
        label:'Quantidade',
        backgroundColor: 'rgb(235, 7, 1)',
        borderColor: 'rgb(235, 7, 1)',
        data:[30, 40, 30],
        },
    ]
  };
  const configG1={
    type: 'bar',
    data: dataG1,
    options:{
         maintainAspectRatio: false, // PERMITE QUE O GRÁFICO ESTIQUE NA VERTICAL
            responsive: true,
            scales: {
                y: {
                    min: 0,
                    max: 100,
                    stacked: true

                },
                x: {
                    stacked: true,
                    offset: true
                }

            },
            plugins: {
                title: {
                    display: true,
                    text: "Qual instrumento mais tocado?",
                },
            },
    }
  }

  const labelsG2=[
    'Tentativa 1',
    'Tentativa 2',
    'Tentativa 3',
    
  ];
  const dataG2={
    labels:labelsG2,
    datasets:[{
        label:'Pontos',
        backgroundColor: 'rgb(235, 7, 1)',
        borderColor: 'rgb(235, 7, 1)',
        data:[8, 9, 10],
        },
    ]
  };
  const configG2={
    type: 'line',
    data: dataG2,
    options:{
         maintainAspectRatio: false, // PERMITE QUE O GRÁFICO ESTIQUE NA VERTICAL
            responsive: true,
            scales: {
                y: {
                    min: 0,
                    max: 10,
                    stacked: true

                },
                x: {
                    stacked: true,
                    offset: true
                }

            },
            plugins: {
                title: {
                    display: true,
                    text: "Pontuação- Teste Música",
                },
            },
    }
  }

  const labelsG3=[
    'Tentativa 1',
    'Tentativa 2',
    'Tentativa 3',
    
  ];
  const dataG3={
    labels: labelsG3,
    datasets:[{
        label:'Pontos',
        backgroundColor: 'rgb(235, 7, 1)',
        borderColor: 'rgb(235, 7, 1)',
        data:[8, 9, 10],
        },
    ]
  };
  const configG3={
    type: 'line',
    data: dataG3,
    options:{
         maintainAspectRatio: false, // PERMITE QUE O GRÁFICO ESTIQUE NA VERTICAL
            responsive: true,
            scales: {
                y: {
                    min: 0,
                    max: 10,
                    stacked: true

                },
                x: {
                    stacked: true,
                    offset: true
                }

            },
            plugins: {
                title: {
                    display: true,
                    text: "Pontuação- Teste Música",
                },
            },
    }
  }


</script>
<script>
const graficosInstrumentos= new Chart(
    document.getElementById('graficosInstrumentos'),
    configG1
)

const graficoQuizMusica= new Chart(
    document.getElementById('graficoQuizMusica'),
    configG2
)

const graficoQuizConhecimento= new Chart(
    document.getElementById('graficoQuizConhecimento'),
    configG3
)

</script>
